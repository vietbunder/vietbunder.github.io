<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD pipeline visual</title>
  <desc id="desc">Abstract delivery pipeline with stages, containers, and release flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="0.52" stop-color="#171729"/>
      <stop offset="1" stop-color="#07080f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#75f4d8"/>
      <stop offset="0.5" stop-color="#8da8ff"/>
      <stop offset="1" stop-color="#f4bd6b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
